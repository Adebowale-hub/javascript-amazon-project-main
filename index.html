<!DOCTYPE html>
<html>

<head>
  <title>Amazon Project</title>

  <!-- This code is needed for responsive design to work.
      (Responsive design = make the website look good on
      smaller screen sizes like a phone or a tablet). -->
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Load a font called Roboto from Google Fonts. -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- Here are the CSS files for this page. -->
  <link rel="stylesheet" href="styles/shared/general.css?v=2">
  <link rel="stylesheet" href="styles/shared/amazon-header.css?v=2">
  <link rel="stylesheet" href="styles/pages/amazon.css?v=2">
</head>

<body>
  <div class="amazon-header">
    <div class="amazon-header-left-section">
      <a href="amazon.html" class="header-link">
        <img class="amazon-logo" src="images/amazon-logo-white.png">
        <img class="amazon-mobile-logo" src="images/amazon-mobile-logo-white.png">
      </a>
    </div>

    <div class="amazon-header-middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <img class="search-icon" src="images/icons/search-icon.png">
      </button>
    </div>

    <div class="amazon-header-right-section">
      <a class="orders-link header-link" href="orders.html">
        <span class="returns-text">Returns</span>
        <span class="orders-text">& Orders</span>
      </a>

      <a class="cart-link header-link" href="checkout.html">
        <img class="cart-icon" src="images/icons/cart-icon.png">
        <div class="cart-quantity js-cart-quantity"></div>
        <div class="cart-text">Cart</div>
      </a>
    </div>
  </div>

  <div class="main">
    <section class="hero-section">
      <div class="hero-content">
        <h1 class="hero-title">Discover Premium Quality</h1>
        <p class="hero-subtitle">Experience shopping like never before with our curated collection of top-tier products.
        </p>
        <button class="hero-cta">Shop New Arrivals</button>
      </div>
    </section>

    <div class="products-grid js-products-grid">

    </div>
  </div>

  <!-- <script src="data/cart.js"></script> -->
  <!-- Add the products with the JSON in the products.js file -->
  <!-- Always first create the array in the products.js -->
  <!-- <script src="data/products.js"></script> -->
  <!-- Then use the type="module" attribute in the amazon.js file -->
  <!-- amazon.js file is called the entry point, it will load the others files. -->
  <script type="module" src="scripts/amazon.js"></script>

</body>

</html>
